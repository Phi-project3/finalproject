<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Results for "{{ search_term }}"</title>
  <style>
    .square {
      width: 150px;
      height: 150px;
      border: 1px solid #ccc;
      margin: 10px;
      display: inline-block;
      vertical-align: top;
      padding: 10px;
      box-sizing: border-box;
      text-align: center;
      overflow: hidden;
      text-decoration: none;
      color: black;
    }

    .square:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Results for "{{ search_term }}"</h1>
  <div>
    {% if records %}
      {% for record in records %}
        <!-- The entire anchor is styled as a "square" -->
        <a href="{{ url_for('product_details', code=record.code) }}" class="square">
          <h3>{{ record.product_name }}</h3>
        </a>
      {% endfor %}
    {% else %}
      <p>No results found.</p>
    {% endif %}
  </div>
  <br>
  <a href="/search">Back to Search</a>
</body>
</html>
